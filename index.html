<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дашборд опроса сотрудников</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="dashboard">
    <h1>Результаты опроса сотрудников</h1>

    <!-- Блок 1: Основные метрики -->
    <div class="metrics-grid">
      <div class="metric-box">
        <h3>Средний балл «Готовность рекомендовать»</h3>
        <div id="avg-recommend"></div>
      </div>
      <div class="metric-box">
        <h3>Соотношение полов</h3>
        <div id="gender-stats"></div>
      </div>
      <div class="metric-box">
        <h3>Средний балл по этике (вопрос 8)</h3>
        <div id="avg-ethics"></div>
      </div>
    </div>

    <!-- Блок 2: Графики -->
    <div class="chart-grid">
      <div class="chart-container">
        <h3>Распределение баллов (Готовность рекомендовать)</h3>
        <canvas id="recommend-chart"></canvas>
      </div>
      <div class="chart-container">
        <h3>Распределение по филиалам</h3>
        <canvas id="branch-chart"></canvas>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
